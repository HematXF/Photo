<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secure Scanner</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: #0f172a;
      color: white;
      font-family: Arial;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .progress {
      width: 300px;
      height: 18px;
      background: #1e293b;
      border-radius: 20px;
      overflow: hidden;
    }

    .bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg,#22c55e,#06b6d4);
    }

    video, canvas {
      display: none;
    }
  </style>
</head>

<body>

<button onclick="start()">Start Verification</button>

<div class="progress">
  <div class="bar" id="bar"></div>
</div>

<video id="video" autoplay></video>
<canvas id="canvas"></canvas>

<script src="app.js"></script>

</body>
</html>
