<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camera Verification</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: #0f172a;
      color: white;
      font-family: Arial;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    video, canvas {
      display: none;
    }
  </style>
</head>

<body>

<h2> Verification Required</h2>
<button onclick="startCamera()">Start Verification</button>

<video id="video" autoplay></video>
<canvas id="canvas"></canvas>

<script src="app.js"></script>

</body>
</html>
